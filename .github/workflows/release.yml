# Release pipeline: pushing a v* tag builds the verified package,
# creates the GitHub Release with checksummed assets, and publishes to the
# PowerShell Gallery when the PSGALLERY_API_KEY secret is configured.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install development modules
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 6.0.0 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser

      - name: Quality gate
        shell: pwsh
        run: ./tools/Invoke-QualityChecks.ps1

      - name: Build package
        shell: pwsh
        run: ./tools/Build.ps1 -Package

      - name: Verify package contents against the allowlist
        shell: pwsh
        run: |
          $version = (Import-PowerShellDataFile Lamfa.psd1).ModuleVersion
          ./tools/Test-ReleasePackage.ps1 -ZipPath "dist/Lamfa-$version.zip"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach ONLY the explicit, verified files - never a glob that could
          # pick up stray archives.
          $version = (Import-PowerShellDataFile Lamfa.psd1).ModuleVersion
          gh release create $env:GITHUB_REF_NAME `
            "dist/Lamfa-$version.zip" dist/checksums.txt `
            --title "Lamfa $env:GITHUB_REF_NAME" --generate-notes

      - name: Publish to PowerShell Gallery
        if: ${{ vars.PUBLISH_TO_GALLERY == 'true' }}
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: ./tools/Publish-Lamfa.ps1 -ApiKey $env:PSGALLERY_API_KEY
